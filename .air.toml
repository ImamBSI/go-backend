root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/main.exe ./cmd/main.go"
  bin = "tmp/main.exe"
  full_bin = "tmp/main.exe"
  delay = 1000

  include_ext = ["go"]
  exclude_dir = ["tmp", "vendor", "testdata"]
  exclude_regex = ["_test.go"]

[log]
  time = true

[screen]
  clear_on_rebuild = true